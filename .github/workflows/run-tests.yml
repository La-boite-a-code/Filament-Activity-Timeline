name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  tests:
    name: P${{ matrix.php }} - F${{ matrix.filament }} - TB${{ matrix.testbench }} - ${{ matrix.stability }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ['8.3', '8.4']
        filament: ['4', '5']
        testbench: ['10', '11']
        stability: [prefer-stable]
        include:
          - php: '8.5'
            filament: '5'
            testbench: '11'
            stability: prefer-stable
          - php: '8.3'
            filament: '4'
            testbench: '10'
            stability: prefer-lowest
          - php: '8.3'
            filament: '5'
            testbench: '10'
            stability: prefer-lowest

    steps:
      - name: Checkout code
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pdo, sqlite, pdo_sqlite, intl, gd
          coverage: none

      - name: Install dependencies
        run: |
          composer require \
            "filament/filament:^${{ matrix.filament }}.0" \
            "orchestra/testbench:^${{ matrix.testbench }}.0" \
            --no-interaction --no-update
          composer update --${{ matrix.stability }} --prefer-dist --no-interaction

      - name: Run tests
        run: vendor/bin/pest
